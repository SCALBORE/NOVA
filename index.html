<html lang="en">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --shard-white:#f2f3f5;
    --shard-silver:#c7cbd1;
    --ink-950:#0a0b0d;
    --ink-900:#121316;
    --glass:rgba(18,19,22,0.46);
    --glass-border:rgba(242,243,245,0.10);
    --bubble-ai:#e7e8ea;
    --bubble-ai-text:#17181a;
    --bubble-user:#33353a;
    --bubble-user-text:#f2f3f5;
    --muted:#9aa0a8;
    --accent-glow: rgba(199,203,209,0.35);
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
    font-family:'Inter', sans-serif;
    color:var(--shard-white);
    overflow:hidden;
  }

  body{
    background: url('nova-bg.png') center 38% / cover no-repeat fixed, var(--ink-950);
  }

  /* darken/atmosphere layer so text stays legible over the mountain,
     strongest at top (header) and bottom (composer), clearest in the middle
     where the image itself should read through */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      linear-gradient(180deg, rgba(6,7,9,0.62) 0%, rgba(6,7,9,0.08) 22%, rgba(6,7,9,0.04) 55%, rgba(6,7,9,0.18) 78%, rgba(6,7,9,0.72) 100%);
    pointer-events:none;
    z-index:0;
  }

  .app{
    position:fixed;
    inset:0;
    z-index:1;
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ---------- Header ---------- */
  .header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:20px 26px;
    background:linear-gradient(180deg, rgba(6,7,9,0.35), rgba(6,7,9,0));
  }

  .shard-mark{
    width:30px; height:30px;
    display:flex;
    align-items:flex-end;
    gap:3px;
    flex-shrink:0;
  }
  .shard-mark span{
    display:block;
    width:5px;
    background: linear-gradient(180deg, var(--shard-white), var(--shard-silver));
    border-radius:1px;
    transform: skewX(-8deg);
  }
  .shard-mark span:nth-child(1){height:30px;}
  .shard-mark span:nth-child(2){height:23px;}
  .shard-mark span:nth-child(3){height:18px;}

  .brand{
    display:flex;
    flex-direction:column;
    line-height:1.15;
  }
  .brand .name{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.12em;
    color:var(--shard-white);
  }
  .brand .status{
    font-size:11.5px;
    color:var(--muted);
    letter-spacing:0.03em;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .dot{
    width:6px; height:6px; border-radius:50%;
    background:#8fe3a3;
    box-shadow:0 0 8px rgba(143,227,163,0.8);
  }

  .header-actions{
    margin-left:auto;
  }
  .clear-btn{
    font-family:'Inter', sans-serif;
    font-size:12px;
    letter-spacing:0.03em;
    color:var(--muted);
    background:rgba(10,11,13,0.35);
    border:1px solid var(--glass-border);
    padding:7px 12px;
    border-radius:8px;
    cursor:pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition:all .15s ease;
  }
  .clear-btn:hover{
    color:var(--shard-white);
    background:rgba(10,11,13,0.55);
  }

  /* ---------- Messages ---------- */
  .messages{
    flex:1;
    overflow-y:auto;
    padding:26px max(22px, calc(50vw - 380px));
    display:flex;
    flex-direction:column;
    gap:16px;
    scroll-behavior:smooth;
  }
  .messages::-webkit-scrollbar{ width:8px; }
  .messages::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.12); border-radius:8px; }
  .messages::-webkit-scrollbar-track{ background:transparent; }

  .row{
    display:flex;
    max-width:100%;
    animation: rise .28s ease;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .row.ai{ justify-content:flex-start; }
  .row.user{ justify-content:flex-end; }

  .bubble{
    max-width:74%;
    padding:12px 16px;
    font-size:14.5px;
    line-height:1.5;
    border-radius:16px;
    word-wrap:break-word;
    white-space:pre-wrap;
  }
  .row.ai .bubble{
    background:var(--bubble-ai);
    color:var(--bubble-ai-text);
    border-bottom-left-radius:4px;
    box-shadow:0 6px 18px -8px rgba(0,0,0,0.5);
  }
  .row.user .bubble{
    background:var(--bubble-user);
    color:var(--bubble-user-text);
    border-bottom-right-radius:4px;
    box-shadow:0 6px 18px -8px rgba(0,0,0,0.5);
  }

  .sender-label{
    font-family:'Space Grotesk', sans-serif;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:4px;
    display:block;
  }
  .row.user .sender-label{ text-align:right; }

  /* typing indicator styled after the shard mark */
  .typing-row .bubble{
    display:flex;
    align-items:center;
    gap:5px;
    padding:14px 18px;
  }
  .typing-row .bar{
    width:4px;
    background:var(--bubble-ai-text);
    opacity:0.55;
    border-radius:2px;
    animation: bar-pulse 1.1s ease-in-out infinite;
  }
  .typing-row .bar:nth-child(1){ height:10px; animation-delay:0s; }
  .typing-row .bar:nth-child(2){ height:16px; animation-delay:0.15s; }
  .typing-row .bar:nth-child(3){ height:8px;  animation-delay:0.3s; }
  @keyframes bar-pulse{
    0%,100%{ transform:scaleY(0.5); opacity:0.35; }
    50%{ transform:scaleY(1); opacity:0.9; }
  }

  /* ---------- Composer ---------- */
  .composer{
    display:flex;
    align-items:flex-end;
    gap:10px;
    padding:14px max(22px, calc(50vw - 380px)) 8px;
    background:linear-gradient(0deg, rgba(6,7,9,0.55) 40%, rgba(6,7,9,0));
  }
  .composer textarea{
    flex:1;
    resize:none;
    max-height:120px;
    min-height:46px;
    padding:13px 15px;
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    color:var(--shard-white);
    background:rgba(10,11,13,0.55);
    border:1px solid var(--glass-border);
    border-radius:14px;
    outline:none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition:border-color .15s ease, background .15s ease;
  }
  .composer textarea::placeholder{ color:var(--muted); }
  .composer textarea:focus{
    border-color:rgba(242,243,245,0.35);
    background:rgba(255,255,255,0.07);
  }

  .send-btn{
    width:44px; height:44px;
    flex-shrink:0;
    border-radius:12px;
    border:1px solid var(--glass-border);
    background:linear-gradient(180deg, var(--shard-white), var(--shard-silver));
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .send-btn:hover{
    box-shadow:0 0 0 4px var(--accent-glow);
  }
  .send-btn:active{ transform:scale(0.94); }
  .send-btn svg{ width:18px; height:18px; }

  .hint{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    padding:0 22px 16px;
    letter-spacing:0.02em;
  }

  @media (max-width:520px){
    .bubble{ max-width:86%; }
    .messages{ padding:20px 14px; }
    .composer{ padding:12px 14px 6px; }
  }
</style>
</head>
<body>

  <div class="app">
    <div class="header">
      <div class="shard-mark"><span></span><span></span><span></span></div>
      <div class="brand">
        <span class="name">NOVA</span>
        <span class="status"><span class="dot"></span>online</span>
      </div>
      <div class="header-actions">
        <button class="clear-btn" id="clearBtn">Clear chat</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="row ai">
        <div>
          <span class="sender-label">Nova</span>
          <div class="bubble">Hi, I'm Nova. Ask me anything — I'll keep it clear and to the point.</div>
        </div>
      </div>
    </div>

    <div class="composer">
      <textarea id="input" placeholder="Message Nova..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 12L20 4L13 20L11 13L4 12Z" fill="#17181a"/>
        </svg>
      </button>
    </div>
    <div class="hint">Nova can make mistakes. Powered by Qwen2.5-1.5B-Instruct — run app.py locally to bring Nova online.</div>
  </div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');

  // Conversation state mirrors the `messages` list in the Python script
  const SYSTEM_PROMPT = "You are Nova, a helpful, clear, friendly AI assistant. Give accurate answers when possible. If you are unsure, say so instead of inventing facts. Keep answers concise unless the user asks for detail.";
  let history = [{ role: "system", content: SYSTEM_PROMPT }];

  // ---- Wire this up to your real model ----
  // This frontend is backend-agnostic. Run the provided Qwen2.5-1.5B-Instruct
  // script behind a small API (e.g. Flask/FastAPI) that accepts {history}
  // and returns {reply}, then point CHAT_ENDPOINT at it. Until then, a
  // lightweight local placeholder responds so the interface is fully testable.
  const CHAT_ENDPOINT = "https://twice11-nova-backend.hf.space/api/chat";

  function autoGrow(){
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }
  inputEl.addEventListener('input', autoGrow);

  function scrollToBottom(){
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text){
    const row = document.createElement('div');
    row.className = `row ${role === 'user' ? 'user' : 'ai'}`;
    row.innerHTML = `
      <div>
        <span class="sender-label">${role === 'user' ? 'You' : 'Nova'}</span>
        <div class="bubble"></div>
      </div>`;
    row.querySelector('.bubble').textContent = text;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function showTyping(){
    const row = document.createElement('div');
    row.className = 'row ai typing-row';
    row.id = 'typingRow';
    row.innerHTML = `
      <div>
        <span class="sender-label">Nova</span>
        <div class="bubble">
          <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
  }
  function hideTyping(){
    const row = document.getElementById('typingRow');
    if(row) row.remove();
  }

  // Placeholder reply generator standing in for the Qwen2.5 model
  function placeholderReply(userText){
    const t = userText.toLowerCase();
    if(/^(hi|hello|hey)\b/.test(t)) return "Hey there! What would you like to talk about?";
    if(t.includes('who are you')) return "I'm Nova — a helpful assistant here to give clear, concise answers.";
    if(t.includes('?')) return "That's a good question. I don't have a live model connected in this demo yet, but once wired to the Qwen2.5-1.5B backend, I'll answer it properly.";
    return "Got it — noted: \"" + userText.slice(0, 80) + (userText.length > 80 ? "…" : "") + "\". Connect me to the backend to get a real response.";
  }

  async function getReply(userText){
    if(CHAT_ENDPOINT){
      const res = await fetch(CHAT_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });
      const data = await res.json();
      return data.reply;
    }
    // simulated latency so the typing indicator reads naturally
    await new Promise(r => setTimeout(r, 700 + Math.random()*500));
    return placeholderReply(userText);
  }

  async function send(){
    const text = inputEl.value.trim();
    if(!text) return;
    addMessage('user', text);
    history.push({ role: 'user', content: text });
    inputEl.value = '';
    autoGrow();

    showTyping();
    try{
      const reply = await getReply(text);
      hideTyping();
      addMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });
    }catch(err){
      hideTyping();
      addMessage('ai', "Something went wrong reaching the backend. Please try again.");
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });

  clearBtn.addEventListener('click', () => {
    history = [{ role: 'system', content: SYSTEM_PROMPT }];
    messagesEl.innerHTML = '';
    addMessage('ai', "Chat history cleared. What would you like to talk about?");
  });
</script>

</body>
</html>
