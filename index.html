<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --shard-white:#f2f3f5;
    --shard-silver:#c7cbd1;
    --ink-950:#0a0b0d;
    --ink-900:#121316;
    --glass:rgba(18,19,22,0.46);
    --glass-border:rgba(242,243,245,0.10);
    --bubble-ai:#e7e8ea;
    --bubble-ai-text:#17181a;
    --bubble-user:#33353a;
    --bubble-user-text:#f2f3f5;
    --muted:#9aa0a8;
    --accent-glow: rgba(199,203,209,0.35);
    --sidebar-bg:#1b1c1f;
    --sidebar-text:#f2f2f2;
    --sidebar-border:rgba(255,255,255,0.08);
    --sidebar-hover:rgba(255,255,255,0.07);
    --sidebar-active:rgba(255,255,255,0.13);
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
    font-family:'Inter', sans-serif;
    color:var(--shard-white);
    overflow:hidden;
  }

  body{
    background: url('nova-bg.png') center 38% / cover no-repeat fixed, var(--ink-950);
  }

  /* darken/atmosphere layer so text stays legible over the mountain,
     strongest at top (header) and bottom (composer), clearest in the middle
     where the image itself should read through */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      linear-gradient(180deg, rgba(6,7,9,0.62) 0%, rgba(6,7,9,0.08) 22%, rgba(6,7,9,0.04) 55%, rgba(6,7,9,0.18) 78%, rgba(6,7,9,0.72) 100%);
    pointer-events:none;
    z-index:0;
  }

  .shell{
    position:fixed;
    inset:0;
    z-index:1;
    display:flex;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:268px;
    flex-shrink:0;
    background:var(--sidebar-bg);
    color:var(--sidebar-text);
    display:flex;
    flex-direction:column;
    border-right:1px solid var(--sidebar-border);
    transition: margin-left .22s ease;
    z-index:25;
  }
  .shell.sidebar-collapsed .sidebar{ margin-left:-268px; }

  .sidebar-top{ padding:14px 14px 8px; }
  .new-chat-btn{
    width:100%;
    display:flex;
    align-items:center;
    gap:9px;
    padding:10px 13px;
    font-family:'Inter', sans-serif;
    font-size:13.5px;
    color:var(--sidebar-text);
    background:rgba(255,255,255,0.06);
    border:1px solid var(--sidebar-border);
    border-radius:10px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .new-chat-btn:hover{ background:var(--sidebar-hover); }
  .new-chat-btn svg{ width:15px; height:15px; flex-shrink:0; }

  .sidebar-search{ padding:8px 14px 6px; }
  .sidebar-search input{
    width:100%;
    padding:8px 11px;
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    color:var(--sidebar-text);
    background:rgba(255,255,255,0.05);
    border:1px solid var(--sidebar-border);
    border-radius:8px;
    outline:none;
  }
  .sidebar-search input::placeholder{ color:var(--muted); }
  .sidebar-search input:focus{ border-color:rgba(242,243,245,0.3); }

  .chat-list{
    flex:1;
    overflow-y:auto;
    padding:6px 8px 8px;
  }
  .chat-list::-webkit-scrollbar{ width:6px; }
  .chat-list::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.12); border-radius:8px; }

  .chat-group-label{
    font-family:'Space Grotesk', sans-serif;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--muted);
    padding:12px 8px 6px;
  }
  .chat-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    padding:9px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:13.3px;
    color:var(--sidebar-text);
    margin-bottom:2px;
  }
  .chat-item:hover{ background:var(--sidebar-hover); }
  .chat-item.active{ background:var(--sidebar-active); }
  .chat-item-title{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    flex:1;
    min-width:0;
  }
  .chat-item-input{
    flex:1;
    min-width:0;
    background:rgba(0,0,0,0.35);
    border:1px solid var(--sidebar-border);
    color:#fff;
    border-radius:6px;
    padding:3px 7px;
    font-size:13px;
    font-family:'Inter', sans-serif;
    outline:none;
  }
  .chat-item-actions{
    display:flex;
    gap:2px;
    flex-shrink:0;
    opacity:0;
    transition:opacity .12s ease;
  }
  .chat-item:hover .chat-item-actions{ opacity:1; }
  .chat-item-actions button{
    width:22px; height:22px;
    display:flex; align-items:center; justify-content:center;
    background:none;
    border:none;
    color:var(--muted);
    cursor:pointer;
    border-radius:5px;
    font-size:12px;
  }
  .chat-item-actions button:hover{ color:#fff; background:rgba(255,255,255,0.12); }
  .chat-empty-note{
    padding:16px 10px;
    color:var(--muted);
    font-size:12.5px;
    text-align:center;
  }

  .sidebar-footer{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px;
    border-top:1px solid var(--sidebar-border);
    color:var(--muted);
    font-size:10.5px;
    letter-spacing:0.03em;
  }
  .sidebar-footer .shard-mark{ width:18px; height:18px; }
  .sidebar-footer .shard-mark span{ width:3px; }
  .sidebar-footer .shard-mark span:nth-child(1){ height:18px; }
  .sidebar-footer .shard-mark span:nth-child(2){ height:14px; }
  .sidebar-footer .shard-mark span:nth-child(3){ height:11px; }

  .sidebar-backdrop{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.5);
    z-index:20;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
  }

  .sidebar-toggle-btn{
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    background:none;
    border:none;
    color:var(--shard-white);
    cursor:pointer;
    border-radius:8px;
    flex-shrink:0;
  }
  .sidebar-toggle-btn:hover{ background:rgba(255,255,255,0.08); }
  .sidebar-toggle-btn svg{ width:19px; height:19px; }

  .app{
    flex:1;
    min-width:0;
    height:100%;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* ---------- Header ---------- */
  .header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:20px 26px;
    background:linear-gradient(180deg, rgba(6,7,9,0.35), rgba(6,7,9,0));
  }

  .shard-mark{
    width:30px; height:30px;
    display:flex;
    align-items:flex-end;
    gap:3px;
    flex-shrink:0;
  }
  .shard-mark span{
    display:block;
    width:5px;
    background: linear-gradient(180deg, var(--shard-white), var(--shard-silver));
    border-radius:1px;
    transform: skewX(-8deg);
  }
  .shard-mark span:nth-child(1){height:30px;}
  .shard-mark span:nth-child(2){height:23px;}
  .shard-mark span:nth-child(3){height:18px;}

  .brand{
    display:flex;
    flex-direction:column;
    line-height:1.15;
  }
  .brand .name{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.12em;
    color:var(--shard-white);
  }
  .brand .status{
    font-size:11.5px;
    color:var(--muted);
    letter-spacing:0.03em;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .dot{
    width:6px; height:6px; border-radius:50%;
    background:#8fe3a3;
    box-shadow:0 0 8px rgba(143,227,163,0.8);
  }

  .header-actions{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .header-icon-btn{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'Inter', sans-serif;
    font-size:12px;
    letter-spacing:0.03em;
    color:var(--muted);
    background:rgba(10,11,13,0.35);
    border:1px solid var(--glass-border);
    padding:7px 12px;
    border-radius:8px;
    cursor:pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition:all .15s ease;
  }
  .header-icon-btn:hover{
    color:var(--shard-white);
    background:rgba(10,11,13,0.55);
  }
  .header-icon-btn svg{ width:13px; height:13px; }
  .clear-btn{ }

  /* ---------- Messages ---------- */
  .messages{
    flex:1;
    overflow-y:auto;
    padding:26px max(22px, calc(50% - 380px));
    display:flex;
    flex-direction:column;
    gap:16px;
    scroll-behavior:smooth;
  }
  .messages.is-empty{
    justify-content:center;
    align-items:center;
  }
  .messages::-webkit-scrollbar{ width:8px; }
  .messages::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.12); border-radius:8px; }
  .messages::-webkit-scrollbar-track{ background:transparent; }

  .welcome-group{
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .greeting-text{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(22px, 4vw, 30px);
    font-weight:500;
    font-variant:small-caps;
    letter-spacing:0.02em;
    text-align:center;
    margin-bottom:26px;
    color:#FFFFFF;
    text-shadow: 0 2px 10px rgba(0,0,0,0.65), 0 0 3px rgba(0,0,0,0.5);
    animation: rise .35s ease;
  }

  /* while empty, the composer lives inside .messages so it sits directly
     under the greeting text, centered together mid-screen */
  .messages.is-empty .composer{
    background:none;
    padding:0;
    margin:0;
    width:min(760px, 92%);
  }
  .messages.is-empty .composer textarea{
    border-radius:999px;
    padding:15px 22px;
  }

  .row{
    display:flex;
    max-width:100%;
    animation: rise .28s ease;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .row.ai{ justify-content:flex-start; }
  .row.user{ justify-content:flex-end; }

  /* wraps sender-label + bubble; carries the max-width so it resolves
     against .row's definite width instead of an indeterminate ancestor —
     that indeterminate percentage was the cause of short messages
     wrapping unpredictably */
  .msg-col{
    display:flex;
    flex-direction:column;
    max-width:74%;
    min-width:0;
  }
  .row.ai .msg-col{ align-items:flex-start; }
  .row.user .msg-col{ align-items:flex-end; }

  .bubble{
    padding:12px 16px;
    font-size:14.5px;
    line-height:1.5;
    border-radius:16px;
    word-wrap:break-word;
    white-space:pre-wrap;
    min-width:0;
  }
  .row.ai .bubble{
    background:var(--bubble-ai);
    color:var(--bubble-ai-text);
    border-bottom-left-radius:4px;
    box-shadow:0 6px 18px -8px rgba(0,0,0,0.5);
  }
  .row.user .bubble{
    background:var(--bubble-user);
    color:var(--bubble-user-text);
    border-bottom-right-radius:4px;
    box-shadow:0 6px 18px -8px rgba(0,0,0,0.5);
  }

  .sender-label{
    font-family:'Space Grotesk', sans-serif;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:4px;
    display:block;
  }
  .row.user .sender-label{ text-align:right; }

  /* typing indicator: classic 3-dot bounce, dark dots inside the light AI bubble */
  .typing-row .bubble{
    display:flex;
    align-items:center;
    gap:6px;
    padding:15px 18px;
  }
  .typing-row .dot{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--bubble-ai-text);
    opacity:0.3;
    animation: dot-bounce 1.2s ease-in-out infinite;
  }
  .typing-row .dot:nth-child(2){ animation-delay:0.2s; }
  .typing-row .dot:nth-child(3){ animation-delay:0.4s; }
  @keyframes dot-bounce{
    0%, 60%, 100%{ transform:translateY(0); opacity:0.3; }
    30%{ transform:translateY(-4px); opacity:1; }
  }

  /* ---------- Composer ---------- */
  .composer{
    display:flex;
    align-items:flex-end;
    gap:10px;
    padding:14px max(22px, calc(50% - 380px)) 8px;
    background:linear-gradient(0deg, rgba(6,7,9,0.55) 40%, rgba(6,7,9,0));
  }
  .composer textarea{
    flex:1;
    resize:none;
    max-height:120px;
    min-height:46px;
    padding:13px 15px;
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    color:var(--shard-white);
    background:rgba(54,57,62,0.62);
    border:1px solid var(--glass-border);
    border-radius:14px;
    outline:none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition:border-color .15s ease, background .15s ease;
  }
  .composer textarea::placeholder{ color:var(--muted); }
  .composer textarea:focus{
    border-color:rgba(242,243,245,0.35);
    background:rgba(255,255,255,0.07);
  }

  .send-btn{
    width:44px; height:44px;
    flex-shrink:0;
    border-radius:12px;
    border:1px solid var(--glass-border);
    background:linear-gradient(180deg, var(--shard-white), var(--shard-silver));
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .send-btn:hover{
    box-shadow:0 0 0 4px var(--accent-glow);
  }
  .send-btn:active{ transform:scale(0.94); }
  .send-btn svg{ width:18px; height:18px; }

  .hint{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    padding:0 22px 16px;
    letter-spacing:0.02em;
  }

  @media (max-width:520px){
    .msg-col{ max-width:86%; }
    .messages{ padding:20px 14px; }
    .composer{ padding:12px 14px 6px; }
  }

  @media (max-width:760px){
    .sidebar{
      position:fixed;
      top:0; left:0; bottom:0;
      margin-left:0 !important;
      transform:translateX(-100%);
      transition:transform .22s ease;
    }
    .shell:not(.sidebar-collapsed) .sidebar{ transform:translateX(0); }
    .shell:not(.sidebar-collapsed) .sidebar-backdrop{ opacity:1; pointer-events:auto; }
  }
</style>
</head>
<body>

  <div class="shell" id="shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="new-chat-btn" id="newChatBtn">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          New chat
        </button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="chatSearch" placeholder="Search chats">
      </div>
      <div class="chat-list" id="chatList"></div>
      <div class="sidebar-footer">
        <div class="shard-mark"><span></span><span></span><span></span></div>
        <span>NOVA · Qwen2.5-1.5B-Instruct</span>
      </div>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <div class="app">
      <div class="header">
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="shard-mark"><span></span><span></span><span></span></div>
        <div class="brand">
          <span class="name">NOVA</span>
          <span class="status"><span class="dot"></span>online</span>
        </div>
        <div class="header-actions">
          <button class="header-icon-btn" id="newChatHeaderBtn">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            New chat
          </button>
          <button class="header-icon-btn clear-btn" id="clearBtn">Clear chat</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="composer">
        <textarea id="input" placeholder="Message Nova..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 12L20 4L13 20L11 13L4 12Z" fill="#17181a"/>
          </svg>
        </button>
      </div>
      <div class="hint">Nova can make mistakes. Powered by Qwen2.5-1.5B-Instruct • Reasoning • Coding • Writing • Analysis</div>
    </div>
  </div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const shellEl = document.getElementById('shell');
  const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');
  const newChatBtn = document.getElementById('newChatBtn');
  const newChatHeaderBtn = document.getElementById('newChatHeaderBtn');
  const chatListEl = document.getElementById('chatList');
  const chatSearchEl = document.getElementById('chatSearch');

  const SYSTEM_PROMPT = "You are Nova, a helpful, clear, friendly AI assistant. Give accurate answers when possible. If you are unsure, say so instead of inventing facts. Keep answers concise unless the user asks for detail.";
  const CHAT_ENDPOINT = "https://twice11-nova-backend.hf.space/api/chat";
  const STORAGE_KEY = "novaChatsV1";

  // ---------------- Multi-chat state (persisted to localStorage; no accounts) ----------------
  let chats = {};
  let activeChatId = null;
  let history = []; // always points at chats[activeChatId].history

  function uid(){
    return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function deriveTitle(text){
    let t = text.trim().replace(/\s+/g, ' ');
    if(t.length > 42) t = t.slice(0, 42).trim() + '…';
    return t.charAt(0).toUpperCase() + t.slice(1);
  }

  function escapeHtml(str){
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ chats, activeChatId }));
    }catch(e){ /* storage full or unavailable — conversation still works this session */ }
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        if(parsed && parsed.chats && Object.keys(parsed.chats).length){
          chats = parsed.chats;
          activeChatId = parsed.activeChatId && chats[parsed.activeChatId] ? parsed.activeChatId : Object.keys(chats)[0];
          return;
        }
      }
    }catch(e){ /* corrupted storage — fall through to a fresh chat */ }
    createChat();
  }

  function createChat(){
    const id = uid();
    chats[id] = {
      id,
      title: null,
      customTitle: false,
      createdAt: Date.now(),
      updatedAt: Date.now(),
      history: [{ role: "system", content: SYSTEM_PROMPT }]
    };
    activeChatId = id;
    saveState();
    return id;
  }

  function groupLabel(ts){
    const now = new Date();
    const d = new Date(ts);
    const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const startOfThat = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    const diffDays = Math.floor((startOfToday - startOfThat) / 86400000);
    if(diffDays <= 0) return 'Today';
    if(diffDays <= 7) return 'Previous 7 Days';
    return 'Older';
  }

  function renderSidebar(){
    const query = chatSearchEl.value.trim().toLowerCase();
    const ids = Object.keys(chats).sort((a, b) => chats[b].updatedAt - chats[a].updatedAt);
    const groups = { 'Today': [], 'Previous 7 Days': [], 'Older': [] };

    ids.forEach(id => {
      const c = chats[id];
      const title = c.title || 'New chat';
      if(query && !title.toLowerCase().includes(query)) return;
      groups[groupLabel(c.updatedAt)].push(c);
    });

    let html = '';
    ['Today', 'Previous 7 Days', 'Older'].forEach(label => {
      if(groups[label].length === 0) return;
      html += `<div class="chat-group-label">${label}</div>`;
      groups[label].forEach(c => {
        const title = escapeHtml(c.title || 'New chat');
        const activeCls = c.id === activeChatId ? ' active' : '';
        html += `<div class="chat-item${activeCls}" data-id="${c.id}">
          <span class="chat-item-title">${title}</span>
          <span class="chat-item-actions">
            <button class="rename-btn" data-id="${c.id}" title="Rename">✎</button>
            <button class="delete-btn" data-id="${c.id}" title="Delete">🗑</button>
          </span>
        </div>`;
      });
    });

    chatListEl.innerHTML = html || `<div class="chat-empty-note">No chats yet</div>`;
  }

  function startRename(id){
    const item = chatListEl.querySelector(`.chat-item[data-id="${id}"]`);
    if(!item) return;
    const titleSpan = item.querySelector('.chat-item-title');
    const input = document.createElement('input');
    input.className = 'chat-item-input';
    input.value = chats[id].title || '';
    titleSpan.replaceWith(input);
    input.focus();
    input.select();

    const commit = () => {
      const val = input.value.trim();
      chats[id].title = val || 'New chat';
      chats[id].customTitle = true;
      saveState();
      renderSidebar();
    };
    input.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){ e.preventDefault(); commit(); }
      else if(e.key === 'Escape'){ renderSidebar(); }
    });
    input.addEventListener('blur', commit);
  }

  function deleteChat(id){
    if(!confirm('Delete this chat?')) return;
    delete chats[id];
    if(activeChatId === id){
      const remaining = Object.keys(chats).sort((a, b) => chats[b].updatedAt - chats[a].updatedAt);
      activeChatId = remaining.length ? remaining[0] : createChat();
      history = chats[activeChatId].history;
      renderActiveChat();
    }
    saveState();
    renderSidebar();
  }

  function isMobile(){ return window.innerWidth <= 760; }

  function closeSidebarOnMobile(){
    if(isMobile()) shellEl.classList.add('sidebar-collapsed');
  }

  function selectChat(id){
    if(id === activeChatId) { closeSidebarOnMobile(); return; }
    activeChatId = id;
    history = chats[id].history;
    renderActiveChat();
    saveState();
    renderSidebar();
    closeSidebarOnMobile();
  }

  chatListEl.addEventListener('click', (e) => {
    const renameBtn = e.target.closest('.rename-btn');
    const deleteBtn = e.target.closest('.delete-btn');
    const item = e.target.closest('.chat-item');
    if(renameBtn){ e.stopPropagation(); startRename(renameBtn.dataset.id); return; }
    if(deleteBtn){ e.stopPropagation(); deleteChat(deleteBtn.dataset.id); return; }
    if(item){ selectChat(item.dataset.id); }
  });

  chatSearchEl.addEventListener('input', renderSidebar);

  function startNewChat(){
    createChat();
    history = chats[activeChatId].history;
    renderActiveChat();
    renderSidebar();
    closeSidebarOnMobile();
    inputEl.focus();
  }
  newChatBtn.addEventListener('click', startNewChat);
  newChatHeaderBtn.addEventListener('click', startNewChat);

  sidebarToggleBtn.addEventListener('click', () => {
    shellEl.classList.toggle('sidebar-collapsed');
    setTimeout(positionWelcomeGroup, 260); // recompute after the slide transition finishes
  });
  sidebarBackdrop.addEventListener('click', () => shellEl.classList.add('sidebar-collapsed'));

  // ---------------- Randomized empty-state greetings ----------------
  const GREETINGS = [
    "How can I help you today?", "What can I help you with?", "Ask me anything.",
    "I'm here to help.", "Ready when you are.", "Start by asking a question.",
    "Tell me what you need.", "What are you working on today?", "What's on your mind?",
    "Need help with something?", "Describe your task.", "Ask a question.",
    "Type your message.", "Start typing...", "Enter your prompt.",
    "What would you like to do?", "What would you like to know?", "How can I assist?",
    "What are we solving today?", "Looking for ideas?", "Need help writing?",
    "Need help coding?", "Need help brainstorming?", "Explain something to me.",
    "Summarize some text.", "Rewrite a paragraph.", "Translate some text.",
    "Generate an idea.", "Draft a message.", "Review some text.",
    "Answer a question.", "Solve a problem.", "Let's get started.",
    "Ready to chat.", "Begin whenever you're ready.", "Type anything.",
    "What's your next task?", "What would you like to create?", "How can I make this easier?",
    "Share your question.", "Paste your text here.", "Describe your problem.",
    "What can we work on?", "Need an explanation?", "Want to learn something?",
    "How may I assist?", "I'm ready.", "Your assistant is ready.",
    "Start a conversation.", "What would you like to explore?", "Ask, create, or learn.",
    "Let's work on it."
  ];

  const composerEl = document.querySelector('.composer');
  const hintEl = document.querySelector('.hint');
  const appEl = document.querySelector('.app');

  // The background image is a fixed 3344x1881 photo. Pixel analysis of the
  // shard mark found the MIDDLE bar's own center sits at x≈0.4985, y≈0.5003
  // of the image (each bar measured individually, not the cluster average).
  // Because the page uses `background-size: cover; background-position:
  // center 38%`, that point lands at a different screen position depending
  // on viewport size/aspect ratio — this reproduces the CSS cover-fit math.
  // It's computed against the full window (the background covers the whole
  // page, sidebar included) then translated into the composer's own local
  // position, so alignment holds whether the sidebar is open or collapsed.
  const BG_W = 3344, BG_H = 1881;
  const BG_POS_Y = 0.38;
  const SHARD_FX = 0.4985, SHARD_FY = 0.5003;

  function computeShardScreenX(){
    const vw = window.innerWidth, vh = window.innerHeight;
    const scale = Math.max(vw / BG_W, vh / BG_H);
    const dispW = BG_W * scale;
    const offsetX = (vw - dispW) * 0.5;
    return offsetX + SHARD_FX * dispW;
  }

  function computeShardScreenY(){
    const vw = window.innerWidth, vh = window.innerHeight;
    const scale = Math.max(vw / BG_W, vh / BG_H);
    const dispH = BG_H * scale;
    const offsetY = (vh - dispH) * BG_POS_Y;
    let target = offsetY + SHARD_FY * dispH;
    const headerH = document.querySelector('.header').offsetHeight;
    const minY = headerH + 90;
    const maxY = vh - hintEl.offsetHeight - 90;
    target = Math.max(minY, Math.min(maxY, target));
    return target;
  }

  function positionWelcomeGroup(){
    const group = document.getElementById('welcomeGroup');
    if(!group) return;
    group.style.transform = 'none'; // reset so we measure true natural position first
    const rect = composerEl.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const targetX = computeShardScreenX();
    const targetY = computeShardScreenY();
    group.style.transform = `translate(${targetX - centerX}px, ${targetY - centerY}px)`;
  }

  function showGreeting(){
    messagesEl.classList.add('is-empty');
    const pick = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
    messagesEl.innerHTML = `<div class="welcome-group" id="welcomeGroup"><div class="greeting-text">${pick}</div></div>`;
    document.getElementById('welcomeGroup').appendChild(composerEl);
    positionWelcomeGroup();
  }

  function resetComposerToBottom(){
    if(messagesEl.classList.contains('is-empty')){
      messagesEl.classList.remove('is-empty');
      appEl.insertBefore(composerEl, hintEl);
    }
  }

  window.addEventListener('resize', () => { positionWelcomeGroup(); });

  function autoGrow(){
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }
  inputEl.addEventListener('input', autoGrow);

  function scrollToBottom(){
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text){
    const row = document.createElement('div');
    row.className = `row ${role === 'user' ? 'user' : 'ai'}`;
    row.innerHTML = `
      <div class="msg-col">
        <span class="sender-label">${role === 'user' ? 'You' : 'Nova'}</span>
        <div class="bubble"></div>
      </div>`;
    row.querySelector('.bubble').textContent = text;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  // Renders whichever chat is currently active: either the blank greeting
  // state (brand-new chat) or a full replay of its saved messages.
  function renderActiveChat(){
    resetComposerToBottom();
    messagesEl.innerHTML = '';
    const chat = chats[activeChatId];
    const hasConversation = chat.history.some(m => m.role !== 'system');
    if(hasConversation){
      chat.history.filter(m => m.role !== 'system').forEach(m => {
        addMessage(m.role === 'user' ? 'user' : 'ai', m.content);
      });
      scrollToBottom();
    }else{
      showGreeting();
    }
  }

  function showTyping(){
    const row = document.createElement('div');
    row.className = 'row ai typing-row';
    row.id = 'typingRow';
    row.innerHTML = `
      <div class="msg-col">
        <span class="sender-label">Nova</span>
        <div class="bubble">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
  }
  function hideTyping(){
    const row = document.getElementById('typingRow');
    if(row) row.remove();
  }

  // Placeholder reply generator standing in for the Qwen2.5 model
  function placeholderReply(userText){
    const t = userText.toLowerCase();
    if(/^(hi|hello|hey)\b/.test(t)) return "Hey there! What would you like to talk about?";
    if(t.includes('who are you')) return "I'm Nova — a helpful assistant here to give clear, concise answers.";
    if(t.includes('?')) return "That's a good question. I don't have a live model connected in this demo yet, but once wired to the Qwen2.5-1.5B backend, I'll answer it properly.";
    return "Got it — noted: \"" + userText.slice(0, 80) + (userText.length > 80 ? "…" : "") + "\". Connect me to the backend to get a real response.";
  }

  async function getReply(userText){
    if(CHAT_ENDPOINT){
      const res = await fetch(CHAT_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });
      const data = await res.json();
      return data.reply;
    }
    await new Promise(r => setTimeout(r, 700 + Math.random()*500));
    return placeholderReply(userText);
  }

  async function send(){
    const text = inputEl.value.trim();
    if(!text) return;
    resetComposerToBottom();
    if(messagesEl.querySelector('.welcome-group')) messagesEl.innerHTML = '';

    const chat = chats[activeChatId];
    const isFirstUserMessage = !chat.history.some(m => m.role === 'user');

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    if(isFirstUserMessage && !chat.customTitle){
      chat.title = deriveTitle(text);
    }
    chat.updatedAt = Date.now();
    saveState();
    renderSidebar();

    inputEl.value = '';
    autoGrow();

    showTyping();
    try{
      const reply = await getReply(text);
      hideTyping();
      addMessage('ai', reply);
      history.push({ role: 'assistant', content: reply });
      chat.updatedAt = Date.now();
      saveState();
      renderSidebar();
    }catch(err){
      hideTyping();
      addMessage('ai', "Something went wrong reaching the backend. Please try again.");
      saveState();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });

  clearBtn.addEventListener('click', () => {
    const chat = chats[activeChatId];
    chat.history = [{ role: 'system', content: SYSTEM_PROMPT }];
    chat.title = null;
    chat.customTitle = false;
    chat.updatedAt = Date.now();
    history = chat.history;
    saveState();
    renderActiveChat();
    renderSidebar();
  });

  // ---------------- Boot ----------------
  loadState();
  history = chats[activeChatId].history;
  shellEl.classList.add('sidebar-collapsed'); // sidebar starts closed; opens only when the user taps the toggle
  renderActiveChat();
  renderSidebar();
</script>

</body>
</html>
